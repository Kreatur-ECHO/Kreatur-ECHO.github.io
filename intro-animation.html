<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro Animation Preview</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fafafa;
    font-family: -apple-system, sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    color: #1a1a2e;
  }

  .mock-content { text-align: center; padding: 2rem; }
  .mock-content h1 { font-size: 2rem; margin-bottom: 0.5rem; }
  .mock-content p { color: #888; }

  /* ===== 遮罩 ===== */
  .intro-overlay {
    position: fixed; inset: 0; z-index: 10000;
    background: #0a0a14;
    transition: opacity 0.6s ease;
  }
  .intro-overlay.dismiss { opacity: 0; pointer-events: none; }

  /* ===== 月亮容器 ===== */
  .moon-stage {
    position: absolute;
    left: 50%;
    bottom: -160px;
    width: 140px; height: 140px;
    margin-left: -70px;
    overflow: visible;
    animation: moonRise 2.2s cubic-bezier(0.45, 0, 0.25, 1) forwards;
  }

  @keyframes moonRise {
    from { bottom: -160px; opacity: 0; }
    18%  { opacity: 0; }
    to   { bottom: 68vh; opacity: 1; }
  }

  /* ==== 水波光晕层 ==== */
  .moon-glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 280px; height: 280px;
    border-radius: 50%;
    pointer-events: none;
    background:
      radial-gradient(circle, rgba(220,190,120,0.14) 0%, rgba(210,175,100,0.06) 40%, transparent 65%);
  }
  /* 水波环：多层圆环叠出立体感 */
  .moon-glow::before,
  .moon-glow::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    pointer-events: none;
  }
  .moon-glow::before {
    width: 170px; height: 170px;
    border: 1.5px solid rgba(220,190,120,0.22);
    animation: rippleOut 3s ease-in-out infinite;
  }
  .moon-glow::after {
    width: 200px; height: 200px;
    border: 1px solid rgba(220,190,120,0.16);
    animation: rippleOut 3s ease-in-out 0.8s infinite;
  }

  @keyframes rippleOut {
    0%   { transform: translate(-50%, -50%) scale(0.6); opacity: 0.55; border-width: 2px; }
    50%  { transform: translate(-50%, -50%) scale(1.25); opacity: 0.3; border-width: 0.6px; }
    100% { transform: translate(-50%, -50%) scale(1.6);  opacity: 0;  border-width: 0.3px; }
  }

  /* ==== 圆月本体 ==== */
  .intro-moon {
    position: absolute;
    top: 10px; left: 10px;
    width: 120px; height: 120px; border-radius: 50%;
    cursor: pointer;
    overflow: hidden;
    background: radial-gradient(circle at 45% 40%, #f7ead0 0%, #ecd9a8 25%, #d4b86a 55%, #b8935a 100%);
    box-shadow:
      inset 0 2px 12px rgba(255,255,255,0.15),
      0 0 50px 14px rgba(220,190,120,0.25),
      0 0 100px 35px rgba(210,175,100,0.14),
      0 0 180px 55px rgba(200,160,80,0.07);
    transition: transform 0.35s ease, box-shadow 0.35s ease;
  }
  .intro-moon:hover {
    transform: scale(1.08);
    box-shadow:
      inset 0 2px 12px rgba(255,255,255,0.15),
      0 0 60px 18px rgba(220,190,120,0.32),
      0 0 120px 42px rgba(210,175,100,0.18),
      0 0 200px 65px rgba(200,160,80,0.1);
  }
  .intro-moon:active {
    transform: scale(0.95);
  }

  /* ==== 3D 纹理层：多片浮动云影模拟月面起伏 ==== */
  .moon-texture {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0.35;
    background:
      /* 暗纹1 */
      radial-gradient(ellipse 42px 30px at 30% 48%, rgba(140,110,60,0.45) 0%, transparent 70%),
      /* 暗纹2 */
      radial-gradient(ellipse 28px 38px at 62% 55%, rgba(140,110,60,0.38) 0%, transparent 65%),
      /* 暗纹3 */
      radial-gradient(ellipse 22px 24px at 48% 28%, rgba(130,100,50,0.32) 0%, transparent 60%),
      /* 亮斑 */
      radial-gradient(ellipse 35px 22px at 42% 38%, rgba(255,250,235,0.3) 0%, transparent 55%);
    animation: textureDrift 6s ease-in-out infinite;
  }
  /* 第二层纹理，反向飘 */
  .moon-texture:nth-child(2) {
    opacity: 0.25;
    background:
      radial-gradient(ellipse 50px 22px at 55% 60%, rgba(150,115,60,0.35) 0%, transparent 65%),
      radial-gradient(ellipse 18px 28px at 35% 40%, rgba(140,105,50,0.3) 0%, transparent 55%),
      radial-gradient(ellipse 30px 16px at 50% 50%, rgba(255,245,225,0.22) 0%, transparent 50%);
    animation: textureDrift 7s ease-in-out 1s infinite reverse;
  }

  @keyframes textureDrift {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(3px, 2px); }
    50%  { transform: translate(-2px, 4px); }
    75%  { transform: translate(-4px, -1px); }
    100% { transform: translate(0, 0); }
  }

  /* ==== 金粉碎光 ==== */
  .intro-spark {
    position: absolute;
    border-radius: 50%;
    background: #f0d78c;
    opacity: 0;
    pointer-events: none;
    box-shadow: 0 0 3px 1px rgba(240,215,140,0.5);
    animation: sparkFloat 2.4s ease-out forwards;
  }

  @keyframes sparkFloat {
    0%   { opacity: 0; transform: translate(0, 0) scale(0); }
    15%  { opacity: 0.9; }
    40%  { opacity: 0.7; transform: scale(1); }
    100% { opacity: 0; transform: translate(15px, -100px) scale(0.2); }
  }
</style>
</head>
<body>

  <div class="mock-content">
    <h1>YEYU's Blog</h1>
    <p>背景内容</p>
  </div>

  <div class="intro-overlay" id="overlay">
    <div class="moon-stage" id="stage">
      <div class="moon-glow"></div>
      <div class="intro-moon" id="moon">
        <div class="moon-texture"></div>
        <div class="moon-texture"></div>
      </div>
      <div id="sparks"></div>
    </div>
  </div>

<script>
  (function () {
    var moon = document.getElementById('moon');
    var overlay = document.getElementById('overlay');
    var sparksContainer = document.getElementById('sparks');

    // 金粉碎光：12 颗随机延时/偏移
    var h = '';
    for (var i = 0; i < 12; i++) {
      var size = 1.5 + Math.random() * 2.5;
      var delay = 0.8 + Math.random() * 1.8;
      var xOff = (Math.random() - 0.5) * 180;
      var yOff = 30 + Math.random() * 90;
      h += '<div class="intro-spark" style="'
        + 'width:' + size + 'px; height:' + size + 'px; '
        + 'bottom:' + yOff + 'px; left:calc(50% + ' + xOff + 'px); '
        + 'animation-delay:' + delay + 's;"></div>';
    }
    sparksContainer.innerHTML = h;

    moon.addEventListener('click', function (e) {
      e.stopPropagation();
      overlay.classList.add('dismiss');
      setTimeout(function () {
        if (overlay.parentNode) overlay.parentNode.remove();
      }, 700);
    });
  })();
</script>
</body>
</html>
