<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro Animation Preview</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* 模拟主页背景 */
  body {
    background: #fafafa;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #1a1a2e;
  }

  .mock-content {
    text-align: center;
    padding: 2rem;
  }
  .mock-content h1 {
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }
  .mock-content p {
    color: #888;
  }

  /* ===== 入场动画遮罩 ===== */
  .intro-overlay {
    position: fixed;
    inset: 0;
    z-index: 10000;
    background: #0a0a14;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
    transition: opacity 0.6s ease;
  }
  .intro-overlay.dismiss {
    opacity: 0;
    pointer-events: none;
  }

  /* ===== 月亮外壳（负责上升动画，不锁 transform） ===== */
  .moon-riser {
    position: absolute;
    left: 50%;
    bottom: -160px;
    width: 120px;
    height: 120px;
    margin-left: -60px;
    animation: moonRise 2.2s cubic-bezier(0.45, 0, 0.25, 1) forwards;
  }

  @keyframes moonRise {
    from { bottom: -160px; opacity: 0; }
    20%  { opacity: 0; }
    to   { bottom: 65vh; opacity: 1; }
  }

  /* ===== 圆月本体（缩放/光晕，动画结束后释放 transform 给 hover） ===== */
  .intro-moon {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    background: radial-gradient(circle at 40% 40%, #f5e6c8 0%, #e8d5a3 30%, #d4b86a 60%, #b8935a 100%);
    box-shadow:
      0 0 40px 10px rgba(220, 190, 120, 0.3),
      0 0 90px 30px rgba(210, 175, 100, 0.18),
      0 0 160px 50px rgba(200, 160, 80, 0.1);
    transition: transform 0.35s ease, box-shadow 0.35s ease;
  }
  .intro-moon.ready:hover {
    transform: scale(1.08);
  }
  .intro-moon.ready:active {
    transform: scale(0.95);
  }

  /* 光晕放在 riser 上，与月亮分离 */
  .moon-riser::after {
    content: '';
    position: absolute;
    inset: -60px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(220,190,120,0.18) 0%, rgba(210,175,100,0.08) 50%, transparent 70%);
    animation: moonGlow 3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes moonGlow {
    0%, 100% { opacity: 0.8; }
    50%      { opacity: 1.2; }
  }
  /* 内光斑（让月亮有层次感） */
  .intro-moon::before {
    content: '';
    position: absolute;
    top: 18%;
    left: 25%;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,250,240,0.6) 0%, transparent 70%);
  }
  /* 表面暗纹 */
  .intro-moon::after {
    content: '';
    position: absolute;
    top: 45%;
    left: 55%;
    width: 35px;
    height: 35px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(160,130,80,0.35) 0%, transparent 70%);
  }

  /* 月亮旁边的碎光点 */
  .intro-spark {
    position: absolute;
    border-radius: 50%;
    background: #f0d78c;
    opacity: 0;
    animation: sparkFloat 2s ease-out forwards;
  }

  @keyframes sparkFloat {
    0%   { opacity: 0; transform: translate(0, 0) scale(0); }
    20%  { opacity: 0.8; transform: translate(8px, -30px) scale(1); }
    100% { opacity: 0; transform: translate(20px, -120px) scale(0.3); }
  }

  /* 主题切换按钮 */
  .theme-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10001;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #ccc;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
  }
</style>
</head>
<body>

  <!-- 模拟主页内容 -->
  <div class="mock-content">
    <h1>YEYU's Blog</h1>
    <p>主页内容在这里（模拟）</p>
  </div>

  <!-- 入场动画遮罩 -->
  <div class="intro-overlay" id="introOverlay">
    <div class="moon-riser" id="moonRiser">
      <div class="intro-moon" id="introMoon"></div>
    </div>
    <div id="sparks"></div>
  </div>

  <button class="theme-btn" onclick="toggleTheme()">切换暗色模式预览</button>

<script>
(function () {
  var moon = document.getElementById('introMoon');
  var overlay = document.getElementById('introOverlay');
  var sparksContainer = document.getElementById('sparks');

  // 生成 8 个碎光点，随机位置在月亮周围
  var sparksHTML = '';
  for (var i = 0; i < 8; i++) {
    var size = 2 + Math.random() * 3;
    var delay = 1 + Math.random() * 1.6;
    var xOff = (Math.random() - 0.5) * 200;
    var yOff = -20 - Math.random() * 100;
    sparksHTML += '<div class="intro-spark" style="'
      + 'width:' + size + 'px; height:' + size + 'px; '
      + 'bottom:' + (-yOff) + 'px; left:calc(50% + ' + xOff + 'px); '
      + 'animation-delay:' + delay + 's;"></div>';
  }
  sparksContainer.innerHTML = sparksHTML;

  // 动画结束后释放 transform，启用 hover 的 scale 效果
  setTimeout(function () {
    moon.classList.add('ready');
  }, 2300);

  // 点击月亮解除遮罩
  function dismiss() {
    if (overlay.classList.contains('dismiss')) return;
    overlay.classList.add('dismiss');
    setTimeout(function () {
      if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
    }, 700);
  }

  moon.addEventListener('click', function (e) {
    e.stopPropagation();
    dismiss();
  });
})();

function toggleTheme() {
  var isDark = document.body.style.background === 'rgb(13, 17, 23)';
  document.body.style.background = isDark ? '#fafafa' : '#0d1117';
  document.querySelector('.mock-content').style.color = isDark ? '#1a1a2e' : '#e6e6e6';
}
</script>
</body>
</html>
