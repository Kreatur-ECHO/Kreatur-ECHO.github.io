<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro Animation Preview</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fafafa;
    font-family: -apple-system, sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    color: #1a1a2e;
  }

  .mock-content { text-align: center; padding: 2rem; }
  .mock-content h1 { font-size: 2rem; margin-bottom: 0.5rem; }
  .mock-content p { color: #888; }

  /* ===== 遮罩 ===== */
  .intro-overlay {
    position: fixed; inset: 0; z-index: 10000;
    background: #0a0a14;
    transition: opacity 0.6s ease;
  }
  .intro-overlay.dismiss { opacity: 0; pointer-events: none; }

  /* ===== 月亮容器（只做 bottom 上升，不做 transform） ===== */
  .moon-stage {
    position: absolute;
    left: 50%;
    bottom: -160px;
    width: 120px; height: 120px;
    margin-left: -60px;
    animation: moonRise 2.2s cubic-bezier(0.45, 0, 0.25, 1) forwards;
  }

  @keyframes moonRise {
    from { bottom: -160px; opacity: 0; }
    18%  { opacity: 0; }
    to   { bottom: 68vh; opacity: 1; }
  }

  /* ==== 水波光晕（在 stage 上，不跟月亮缩放） ==== */
  .moon-stage::before,
  .moon-stage::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  /* 底层静态柔光 */
  .moon-stage::before {
    width: 240px; height: 240px;
    background: radial-gradient(circle,
      rgba(220,190,120,0.18) 0%,
      rgba(210,175,100,0.10) 30%,
      rgba(200,160,80,0.04)  55%,
      transparent 70%);
  }
  /* 水波：圆环先缩后胀，带透明度波浪 */
  .moon-stage::after {
    width: 140px; height: 140px;
    background: radial-gradient(circle,
      transparent 25%,
      rgba(220,190,120,0.25) 40%,
      rgba(210,175,100,0.12) 55%,
      transparent 70%);
    animation: waterRipple 2.8s ease-in-out infinite;
  }

  @keyframes waterRipple {
    0%   { transform: translate(-50%, -50%) scale(1);   opacity: 0.4; }
    25%  { transform: translate(-50%, -50%) scale(1.4); opacity: 0.9; }
    50%  { transform: translate(-50%, -50%) scale(1.7); opacity: 0.3; }
    75%  { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
    100% { transform: translate(-50%, -50%) scale(1);   opacity: 0.4; }
  }

  /* ==== 圆月本体 ==== */
  .intro-moon {
    position: relative;
    width: 120px; height: 120px; border-radius: 50%;
    cursor: pointer;
    background: radial-gradient(circle at 40% 40%, #f5e6c8 0%, #e8d5a3 30%, #d4b86a 60%, #b8935a 100%);
    transition: transform 0.35s ease;
  }
  .intro-moon:hover {
    transform: scale(1.08);
  }
  .intro-moon:active {
    transform: scale(0.95);
  }

  /* 月面细节 */
  .intro-moon::before {
    content: '';
    position: absolute;
    top: 18%; left: 25%;
    width: 50px; height: 50px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,250,240,0.5) 0%, transparent 70%);
  }
  .intro-moon::after {
    content: '';
    position: absolute;
    top: 45%; left: 55%;
    width: 35px; height: 35px; border-radius: 50%;
    background: radial-gradient(circle, rgba(160,130,80,0.30) 0%, transparent 70%);
  }
</style>
</head>
<body>

  <div class="mock-content">
    <h1>YEYU's Blog</h1>
    <p>背景内容</p>
  </div>

  <div class="intro-overlay" id="overlay">
    <div class="moon-stage">
      <div class="intro-moon" id="moon"></div>
    </div>
  </div>

<script>
  var moon = document.getElementById('moon');
  var overlay = document.getElementById('overlay');

  moon.addEventListener('click', function (e) {
    e.stopPropagation();
    overlay.classList.add('dismiss');
    setTimeout(function () {
      if (overlay.parentNode) overlay.parentNode.remove();
    }, 700);
  });
</script>
</body>
</html>
