<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro Animation Preview</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a14;
    font-family: -apple-system, sans-serif;
    min-height: 100vh; margin: 0; overflow: hidden;
  }

  /* ===== 遮罩 ===== */
  .intro-overlay {
    position: fixed; inset: 0; z-index: 10000;
    background: #0a0a14;
    transition: opacity 0.6s ease;
  }
  .intro-overlay.dismiss { opacity: 0; pointer-events: none; }

  /* ===== YEYU 文字 ===== */
  .logo-wrap {
    position: absolute;
    left: 50%; bottom: 5vh;
    transform: translateX(-50%);
    opacity: 0;
    pointer-events: none; z-index: 0;
    -webkit-mask-image: linear-gradient(to bottom, #000 0%, #000 65%, transparent 100%);
    mask-image: linear-gradient(to bottom, #000 0%, #000 65%, transparent 100%);
    animation: logoRise 2.2s cubic-bezier(0.45, 0, 0.25, 1) forwards;
  }
  @keyframes logoRise {
    from { bottom: -40px; opacity: 0; }
    18%  { opacity: 0; }
    to   { bottom: 5vh; opacity: 1; }
  }

  .intro-logo {
    position: relative; z-index: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-size: 35vw; font-weight: 800;
    letter-spacing: 0.04em; line-height: 0.85; white-space: nowrap;
    color: #e8e0d0;
  }
  .intro-logo .logo-accent { color: #6c63ff; }

  /* ===== 月亮容器 ===== */
  .moon-stage {
    position: absolute;
    left: 50%; bottom: -160px;
    width: 140px; height: 140px; margin-left: -70px;
    overflow: visible; z-index: 2;
    animation: moonRise 2.2s cubic-bezier(0.45, 0, 0.25, 1) forwards;
  }
  @keyframes moonRise {
    from { bottom: -160px; opacity: 0; }
    18%  { opacity: 0; }
    to   { bottom: 68vh; opacity: 1; }
  }

  .moon-stage::before {
    content: ''; position: absolute;
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 180px; height: 180px; border-radius: 50%; pointer-events: none;
    background: radial-gradient(circle, rgba(220,190,120,0.15) 0%, rgba(210,175,100,0.07) 35%, transparent 55%);
  }
  .moon-stage::after {
    content: ''; position: absolute;
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 150px; height: 150px; border-radius: 50%; pointer-events: none;
    border: 1.5px solid rgba(220,190,120,0.16);
    animation: rippleIn 3s ease-in-out infinite;
  }
  @keyframes rippleIn {
    0%   { transform: translate(-50%,-50%) scale(1.4); opacity: 0;   border-width: 0.3px; }
    50%  { transform: translate(-50%,-50%) scale(0.8); opacity: 0.45; border-width: 1.8px; }
    100% { transform: translate(-50%,-50%) scale(0.5); opacity: 0.1; border-width: 0.5px; }
  }

  /* ===== 圆月本体 ===== */
  .intro-moon {
    position: absolute; top: 10px; left: 10px;
    width: 120px; height: 120px; border-radius: 50%;
    cursor: pointer; overflow: hidden;
    background: radial-gradient(circle at 45% 40%, #f7ead0 0%, #ecd9a8 25%, #d4b86a 55%, #b8935a 100%);
    box-shadow: inset 0 2px 12px rgba(255,255,255,0.2), 0 0 50px 14px rgba(220,190,120,0.25), 0 0 100px 35px rgba(210,175,100,0.14), 0 0 180px 55px rgba(200,160,80,0.07);
    transition: transform 0.35s ease, box-shadow 0.35s ease;
  }
  .intro-moon:hover {
    transform: scale(1.08);
    box-shadow: inset 0 2px 12px rgba(255,255,255,0.15), 0 0 60px 18px rgba(220,190,120,0.32), 0 0 120px 42px rgba(210,175,100,0.18), 0 0 200px 65px rgba(200,160,80,0.1);
  }
  .intro-moon:active { transform: scale(0.95); }

  /* ==== 月面纹理 ==== */
  .moon-texture {
    position: absolute; inset: 0; border-radius: 50%; pointer-events: none;
    opacity: 0.5;
    background:
      radial-gradient(ellipse 44px 32px at 28% 52%, rgba(110,80,40,0.55) 0%, transparent 65%),
      radial-gradient(ellipse 30px 40px at 64% 48%, rgba(115,85,42,0.48) 0%, transparent 60%),
      radial-gradient(ellipse 24px 26px at 50% 24%, rgba(100,70,35,0.4) 0%, transparent 58%),
      radial-gradient(ellipse 38px 24px at 40% 40%, rgba(255,250,235,0.35) 0%, transparent 50%);
    animation: textureDrift 5s ease-in-out infinite;
  }
  .moon-texture:nth-child(2) {
    opacity: 0.38;
    background:
      radial-gradient(ellipse 52px 24px at 58% 62%, rgba(120,88,42,0.45) 0%, transparent 62%),
      radial-gradient(ellipse 20px 30px at 32% 38%, rgba(105,78,38,0.38) 0%, transparent 52%),
      radial-gradient(ellipse 32px 18px at 52% 48%, rgba(255,248,228,0.28) 0%, transparent 48%);
    animation: textureDrift 6.5s ease-in-out 1.5s infinite reverse;
  }
  @keyframes textureDrift {
    0%   { transform: translate(0,0) rotate(0deg); }
    25%  { transform: translate(8px,5px) rotate(0.5deg); }
    50%  { transform: translate(-5px,10px) rotate(-0.3deg); }
    75%  { transform: translate(-10px,-3px) rotate(-0.6deg); }
    100% { transform: translate(0,0) rotate(0deg); }
  }

  /* ==== 月芯霓虹 ==== */
  .moon-bulb {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 8px; height: 8px; border-radius: 50%; background: #fffffa;
    box-shadow: 0 0 6px 3px rgba(255,255,245,0.95), 0 0 16px 10px rgba(255,245,210,0.55), 0 0 35px 20px rgba(255,235,180,0.3), 0 0 65px 38px rgba(255,220,150,0.15);
    pointer-events: none; z-index: 3;
    animation: bulbPulse 2.5s ease-in-out infinite;
  }
  @keyframes bulbPulse {
    0%,100%{opacity:0.65;box-shadow:0 0 6px 3px rgba(255,255,245,0.95),0 0 16px 10px rgba(255,245,210,0.55),0 0 35px 20px rgba(255,235,180,0.3),0 0 65px 38px rgba(255,220,150,0.15)}
    50%{opacity:1;box-shadow:0 0 10px 5px rgba(255,255,250,1),0 0 24px 14px rgba(255,248,220,0.7),0 0 45px 26px rgba(255,235,180,0.45),0 0 80px 50px rgba(255,220,150,0.25)}
  }

  /* ==== 金粉尾迹粒子 ==== */
  .curtain-spark {
    position: fixed;
    z-index: 10001;
    border-radius: 50%;
    background: #ffd866;
    pointer-events: none;
    box-shadow: 0 0 12px 6px rgba(255,216,100,0.95), 0 0 30px 12px rgba(255,200,80,0.6);
  }

  /* 帘幕粒子渐闪：呼吸式闪烁 */
  @keyframes curtainFade {
    0%, 100% { opacity: 0.15; }
    30%       { opacity: 0.7; }
    60%       { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="intro-overlay" id="overlay">
  <div class="logo-wrap" id="logoWrap">
    <div class="intro-logo">Y<span class="logo-accent">E</span>YU</div>
  </div>
  <div class="moon-stage" id="stage">
    <div class="intro-moon" id="moon">
      <div class="moon-texture"></div>
      <div class="moon-texture"></div>
      <div class="moon-bulb"></div>
    </div>
  </div>
</div>

<script>
(function () {
  var moon = document.getElementById('moon');
  var overlay = document.getElementById('overlay');
  var stage = document.getElementById('stage');

  // ---- 1. 金粉屏障 — 密集底部，月亮冲破推起，自然钟形 ----
  var W = window.innerWidth, H = window.innerHeight;
  var barrier = [];

  // 正态采样
  function N(m, s) {
    return s * Math.sqrt(-2 * Math.log(Math.max(0.001, 1 - Math.random()))) * Math.cos(2 * Math.PI * Math.random()) + m;
  }

  for (var i = 0; i < 1200; i++) {
    var dot = document.createElement('div');
    dot.className = 'curtain-spark';
    var sz = 2 + Math.random() * 4;
    // 底部 78-98vh，正态水平分布
    var py = (0.78 + Math.random() * 0.20) * H;
    var px = N(W * 0.5, W * 0.15);
    dot.style.width  = sz + 'px';
    dot.style.height = sz + 'px';
    dot.style.left   = px + 'px';
    dot.style.top    = py + 'px';
    dot.style.opacity = (0.6 + Math.random() * 0.3);
    dot.style.animation = 'none';
    overlay.appendChild(dot);
    barrier.push({ el: dot, py: py, startY: py, vy: 0, life: 0, born: 0, done: false });
  }

  var t0 = 0;
  function wakeLoop(ts) {
    var now = performance.now();
    if (!t0) t0 = now;
    var elapsed = (now - t0) / 1000;
    var rect = stage.getBoundingClientRect();
    var mx = rect.left + rect.width / 2;
    var my = rect.top + rect.height + 30; // 月亮下沿往下 30px

    for (var b = 0; b < barrier.length; b++) {
      var p = barrier[b];
      if (p.done) {
        var age = (now - p.born) / 1000;
        if (age > p.life) { p.el.style.opacity = '0'; continue; }
        p.el.style.opacity = age < 0.4 ? (0.6 + age / 0.4 * 0.3) : (1 - (age - 0.4) / (p.life - 0.4)) * 0.7;
        p.py += p.vy * 0.016;
        p.el.style.top = p.py + 'px';
        continue;
      }
      // 检测碰撞
      var dx = parseFloat(p.el.style.left) - mx;
      var dy = p.py - my;
      var dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 350 && p.py < my + 100 && elapsed > 0.3) {
        p.done = true; p.born = now; p.life = 2 + Math.random() * 3;
        var k = Math.max(0.08, 1 - dist / 350);
        p.vy = -(k * 650 + 20);
        p.el.style.opacity = '0.9';
      }
    }
    requestAnimationFrame(wakeLoop);
  }
  requestAnimationFrame(wakeLoop);

  // ---- 2. 交互 ----
  moon.addEventListener('click', function (e) {
    e.stopPropagation();
    overlay.classList.add('dismiss');
    setTimeout(function () {
      if (overlay.parentNode) overlay.parentNode.remove();
    }, 700);
  });
})();
</script>
</body>
</html>
