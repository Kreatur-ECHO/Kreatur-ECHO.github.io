<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro Animation Preview</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fafafa;
    font-family: -apple-system, sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    color: #1a1a2e;
  }

  .mock-content { text-align: center; padding: 2rem; }
  .mock-content h1 { font-size: 2rem; margin-bottom: 0.5rem; }
  .mock-content p { color: #888; }

  /* ===== 遮罩 ===== */
  .intro-overlay {
    position: fixed; inset: 0; z-index: 10000;
    background: #0a0a14;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.6s ease;
  }
  .intro-overlay.dismiss { opacity: 0; pointer-events: none; }

  /* ===== 月亮容器（含光晕） ===== */
  .moon-stage {
    position: relative;
    width: 120px; height: 120px;
  }

  /* 圆月 — 只有 hover */
  .intro-moon {
    width: 120px; height: 120px; border-radius: 50%;
    cursor: pointer;
    background: radial-gradient(circle at 40% 40%, #f5e6c8 0%, #e8d5a3 30%, #d4b86a 60%, #b8935a 100%);
    box-shadow:
      0 0 60px 20px rgba(220, 190, 120, 0.25),
      0 0 120px 40px rgba(210, 175, 100, 0.15),
      0 0 200px 60px rgba(200, 160, 80, 0.08);
    transition: transform 0.35s ease;
  }
  .intro-moon:hover {
    transform: scale(1.08);
  }
  .intro-moon:active {
    transform: scale(0.95);
  }
</style>
</head>
<body>

  <div class="mock-content">
    <h1>YEYU's Blog</h1>
    <p>背景内容</p>
  </div>

  <div class="intro-overlay" id="overlay">
    <div class="moon-stage">
      <div class="intro-moon" id="moon"></div>
    </div>
  </div>

<script>
  var moon = document.getElementById('moon');
  var overlay = document.getElementById('overlay');

  moon.addEventListener('click', function (e) {
    e.stopPropagation();
    overlay.classList.add('dismiss');
    setTimeout(function () {
      if (overlay.parentNode) overlay.parentNode.remove();
    }, 700);
  });
</script>
</body>
</html>
