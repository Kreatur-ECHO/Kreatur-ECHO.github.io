<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro Animation Preview</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fafafa;
    font-family: -apple-system, sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    color: #1a1a2e;
  }

  .mock-content { text-align: center; padding: 2rem; }
  .mock-content h1 { font-size: 2rem; margin-bottom: 0.5rem; }
  .mock-content p { color: #888; }

  /* ===== 遮罩 ===== */
  .intro-overlay {
    position: fixed; inset: 0; z-index: 10000;
    background: #0a0a14;
    transition: opacity 0.6s ease;
  }
  .intro-overlay.dismiss { opacity: 0; pointer-events: none; }

  /* ===== 月亮容器 ===== */
  .moon-stage {
    position: absolute;
    left: 50%;
    bottom: -160px;
    width: 140px; height: 140px;
    margin-left: -70px;
    overflow: visible;
    animation: moonRise 2.2s cubic-bezier(0.45, 0, 0.25, 1) forwards;
  }

  @keyframes moonRise {
    from { bottom: -160px; opacity: 0; }
    18%  { opacity: 0; }
    to   { bottom: 68vh; opacity: 1; }
  }

  /* ==== 圆月本体 ==== */
  .intro-moon {
    position: absolute;
    top: 10px; left: 10px;
    width: 120px; height: 120px; border-radius: 50%;
    cursor: pointer;
    overflow: hidden;
    background: radial-gradient(circle at 45% 40%, #f7ead0 0%, #ecd9a8 25%, #d4b86a 55%, #b8935a 100%);
    box-shadow:
      inset 0 2px 12px rgba(255,255,255,0.15),
      0 0 50px 14px rgba(220,190,120,0.25),
      0 0 100px 35px rgba(210,175,100,0.14),
      0 0 180px 55px rgba(200,160,80,0.07);
    transition: transform 0.35s ease, box-shadow 0.35s ease;
  }
  .intro-moon:hover {
    transform: scale(1.08);
    box-shadow:
      inset 0 2px 12px rgba(255,255,255,0.15),
      0 0 60px 18px rgba(220,190,120,0.32),
      0 0 120px 42px rgba(210,175,100,0.18),
      0 0 200px 65px rgba(200,160,80,0.1);
  }
  .intro-moon:active {
    transform: scale(0.95);
  }

  /* 融入月亮的水波光晕（在 stage 伪元素上，圆心与月亮重合） */
  .moon-stage::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 180px; height: 180px;
    border-radius: 50%;
    pointer-events: none;
    background: radial-gradient(circle,
      rgba(220,190,120,0.15) 0%,
      rgba(210,175,100,0.07) 35%,
      transparent 55%);
  }
  .moon-stage::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 150px; height: 150px;
    border-radius: 50%;
    pointer-events: none;
    border: 1.5px solid rgba(220,190,120,0.16);
    animation: rippleIn 3s ease-in-out infinite;
  }

  @keyframes rippleIn {
    0%   { transform: translate(-50%, -50%) scale(1.4); opacity: 0;   border-width: 0.3px; }
    50%  { transform: translate(-50%, -50%) scale(0.8); opacity: 0.45; border-width: 1.8px; }
    100% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.1; border-width: 0.5px; }
  }

  @keyframes rippleOut {
    0%   { transform: scale(0.5); opacity: 0.5; border-width: 2px; }
    50%  { transform: scale(1.1); opacity: 0.25; border-width: 0.8px; }
    100% { transform: scale(1.5); opacity: 0;   border-width: 0.3px; }
  }

  /* ==== 3D 纹理层：多片浮动云影模拟月面起伏 ==== */
  .moon-texture {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0.5;
    background:
      radial-gradient(ellipse 44px 32px at 28% 52%, rgba(110,80,40,0.55) 0%, transparent 65%),
      radial-gradient(ellipse 30px 40px at 64% 48%, rgba(115,85,42,0.48) 0%, transparent 60%),
      radial-gradient(ellipse 24px 26px at 50% 24%, rgba(100,70,35,0.4) 0%, transparent 58%),
      radial-gradient(ellipse 38px 24px at 40% 40%, rgba(255,250,235,0.35) 0%, transparent 50%);
    animation: textureDrift 5s ease-in-out infinite;
  }
  .moon-texture:nth-child(2) {
    opacity: 0.38;
    background:
      radial-gradient(ellipse 52px 24px at 58% 62%, rgba(120,88,42,0.45) 0%, transparent 62%),
      radial-gradient(ellipse 20px 30px at 32% 38%, rgba(105,78,38,0.38) 0%, transparent 52%),
      radial-gradient(ellipse 32px 18px at 52% 48%, rgba(255,248,228,0.28) 0%, transparent 48%);
    animation: textureDrift 6.5s ease-in-out 1.5s infinite reverse;
  }

  @keyframes textureDrift {
    0%   { transform: translate(0, 0) rotate(0deg); }
    25%  { transform: translate(8px, 5px) rotate(0.5deg); }
    50%  { transform: translate(-5px, 10px) rotate(-0.3deg); }
    75%  { transform: translate(-10px, -3px) rotate(-0.6deg); }
    100% { transform: translate(0, 0) rotate(0deg); }
  }

  /* 月亮中央暖光（在纹理层上方） */
  .moon-center-glow {
    position: absolute;
    inset: 15%;
    border-radius: 50%;
    pointer-events: none;
    z-index: 2;
    background: radial-gradient(circle,
      rgba(255,248,220,0.55) 0%,
      rgba(255,240,200,0.25) 25%,
      transparent 60%);
    animation: centerWarmth 4s ease-in-out infinite;
  }

  @keyframes centerWarmth {
    0%, 100% { opacity: 0.6; }
    50%      { opacity: 1; }
  }

  /* ==== 金粉碎光 ==== */
  .intro-spark {
    position: absolute;
    border-radius: 50%;
    background: #f0d78c;
    opacity: 0;
    pointer-events: none;
    box-shadow: 0 0 3px 1px rgba(240,215,140,0.5);
    animation: sparkRise 6s ease-in infinite;
  }

  @keyframes sparkRise {
    0%   { opacity: 0;   transform: translate(0, 20px) scale(0.3); }
    15%  { opacity: 0.7; transform: translate(0, 10px) scale(0.8); }
    25%  { opacity: 0.5; transform: translate(0, 0) scale(1); }
    50%  { opacity: 0.2; transform: translate(0, -30px) scale(0.7); }
    100% { opacity: 0;   transform: translate(0, -60px) scale(0.2); }
  }
</style>
</head>
<body>

  <div class="mock-content">
    <h1>YEYU's Blog</h1>
    <p>背景内容</p>
  </div>

  <div class="intro-overlay" id="overlay">
    <div class="moon-stage" id="stage">
      <div class="intro-moon" id="moon">
        <div class="moon-texture"></div>
        <div class="moon-texture"></div>
        <div class="moon-center-glow"></div>
      </div>
      <div id="sparks"></div>
    </div>
  </div>

<script>
  (function () {
    var moon = document.getElementById('moon');
    var overlay = document.getElementById('overlay');
    var sparksContainer = document.getElementById('sparks');

    // 金粉碎光：20 颗环绕月亮，缓慢上浮，每颗节奏不同
    var h = '';
    for (var i = 0; i < 20; i++) {
      var size = 1.2 + Math.random() * 2.8;
      var dur = 4 + Math.random() * 8;       // 4~12s，有快有慢
      var delay = Math.random() * dur;       // 随机相位
      var angle = Math.random() * Math.PI * 2;
      var dist = 50 + Math.random() * 75;
      var xOff = Math.cos(angle) * dist;
      var yOff = Math.sin(angle) * dist;
      h += '<div class="intro-spark" style="'
        + 'width:' + size + 'px; height:' + size + 'px; '
        + 'top:calc(50% + ' + yOff.toFixed(0) + 'px); left:calc(50% + ' + xOff.toFixed(0) + 'px); '
        + 'animation-duration:' + dur.toFixed(1) + 's; '
        + 'animation-delay:' + delay.toFixed(1) + 's;"></div>';
    }
    sparksContainer.innerHTML = h;

    moon.addEventListener('click', function (e) {
      e.stopPropagation();
      overlay.classList.add('dismiss');
      setTimeout(function () {
        if (overlay.parentNode) overlay.parentNode.remove();
      }, 700);
    });
  })();
</script>
</body>
</html>
