name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject reactions token
        run: |
          sed -i "s|REACTIONS_TOKEN_PLACEHOLDER|${{ secrets.REACTIONS_TOKEN }}|g" data/config.js

      - name: Refresh comments.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -s -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/Kreatur-ECHO/Kreatur-ECHO.github.io/issues/2/comments?per_page=50" \
            > data/comments.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
